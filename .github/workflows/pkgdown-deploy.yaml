name: pkgdown-deploy

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"
  NOT_CRAN: "true"
  TZ: "UTC"
  MULTISITEDGP_REPRODUCIBILITY_POLICY: "linux-strict-hash-cross-os-demoted"
  MULTISITEDGP_ALLOW_NON_LINUX_PRINT_REGEN: "false"

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
          install-quarto: false

      - name: Build pkgdown site
        run: pkgdown::build_site(".", preview = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Check pkgdown metadata
        run: pkgdown::check_pkgdown(".")
        shell: Rscript {0}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
