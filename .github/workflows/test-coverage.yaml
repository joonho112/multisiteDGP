name: test-coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"
  NOT_CRAN: "true"
  TZ: "UTC"
  MULTISITEDGP_RUN_SLOW: "false"
  MULTISITEDGP_RUN_PROPERTY: "false"
  MULTISITEDGP_RUN_VALIDATION: "false"
  MULTISITEDGP_REPRODUCIBILITY_POLICY: "linux-strict-hash-cross-os-demoted"
  MULTISITEDGP_ALLOW_NON_LINUX_PRINT_REGEN: "false"

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'
          extra-packages: |
            any::covr
            any::pkgload
            any::testthat
            any::knitr
            any::rmarkdown
          install-quarto: false

      - name: Check exported-function coverage
        run: |
          pkgload::load_all(".", quiet = TRUE)
          ns <- asNamespace("multisiteDGP")
          exported <- getNamespaceExports(ns)
          internal <- setdiff(ls(ns), exported)
          internal <- internal[vapply(internal, function(name) is.function(get(name, envir = ns)), logical(1))]
          internal_regex <- paste0(
            "^",
            gsub("([][{}()+*^$|\\\\?.])", "\\\\\\1", internal),
            "$"
          )

          cov <- covr::package_coverage(
            type = "tests",
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "multisiteDGP-cov"),
            function_exclusions = internal_regex
          )

          line_cov <- covr::percent_coverage(cov, by = "line")
          writeLines(sprintf("Exported-function line coverage: %.2f%%", line_cov))
          if (line_cov < 90) {
            stop(sprintf("Coverage %.2f%% < 90%% target", line_cov), call. = FALSE)
          }

          covr::to_cobertura(cov, filename = "cobertura.xml")
        shell: Rscript {0}

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-cobertura
          path: cobertura.xml
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true
