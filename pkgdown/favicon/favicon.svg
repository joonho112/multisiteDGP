<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 181 209" role="img" aria-label="multisiteDGP hex sticker — caterpillar plot motif" width="181" height="209"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><title>multisiteDGP</title><desc>Hex package sticker for the multisiteDGP R package. A caterpillar plot of nine site-level effects with confidence-interval whiskers sits inside a hex outline. The package wordmark sits along the lower baseline.</desc><defs>
    <!-- Point-up hex path, 181x209, vertices on the bounding box edges -->
    <clipPath id="hex-clip">
      <polygon points="90.5,1.5 179.5,52.25 179.5,156.75 90.5,207.5 1.5,156.75 1.5,52.25"></polygon>
    </clipPath>
  </defs><polygon points="90.5,1.5 179.5,52.25 179.5,156.75 90.5,207.5 1.5,156.75 1.5,52.25" fill="none"></polygon><g clip-path="url(#hex-clip)" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

    <!-- Vertical reference line at tau = 0 (centerline) -->
    <line x1="90.5" y1="38" x2="90.5" y2="138" stroke="#1B4965" stroke-width="0.9" stroke-dasharray="2.4 2" opacity="0.55"></line>

    <!-- Nine site-level effects: horizontal whiskers + center points
         Y range 42..134 (9 rows, 11.5px spacing).
         Centers wander around x=90.5; whiskers narrow as we descend
         (precision climbs with site size — visual cue). -->
    <g stroke="#62B6CB" stroke-linecap="round" fill="#62B6CB">
      <!-- Row 1: low precision (wide whisker), negative effect -->
      <line x1="46" y1="42" x2="98" y2="42" stroke-width="2.2"></line>
      <circle cx="72" cy="42" r="2.6"></circle>

      <!-- Row 2 -->
      <line x1="58" y1="53.5" x2="120" y2="53.5" stroke-width="2.2"></line>
      <circle cx="89" cy="53.5" r="2.6"></circle>

      <!-- Row 3 -->
      <line x1="64" y1="65" x2="108" y2="65" stroke-width="2.2"></line>
      <circle cx="86" cy="65" r="2.6"></circle>

      <!-- Row 4 -->
      <line x1="72" y1="76.5" x2="116" y2="76.5" stroke-width="2.2"></line>
      <circle cx="94" cy="76.5" r="2.6"></circle>

      <!-- Row 5 (mid; near tau=0) -->
      <line x1="76" y1="88" x2="106" y2="88" stroke-width="2.2"></line>
      <circle cx="91" cy="88" r="2.6"></circle>

      <!-- Row 6 -->
      <line x1="80" y1="99.5" x2="112" y2="99.5" stroke-width="2.2"></line>
      <circle cx="96" cy="99.5" r="2.6"></circle>

      <!-- Row 7 -->
      <line x1="84" y1="111" x2="108" y2="111" stroke-width="2.2"></line>
      <circle cx="96" cy="111" r="2.6"></circle>

      <!-- Row 8 -->
      <line x1="78" y1="122.5" x2="100" y2="122.5" stroke-width="2.2"></line>
      <circle cx="89" cy="122.5" r="2.6"></circle>

      <!-- Row 9: highest precision (tight whisker) -->
      <line x1="86" y1="134" x2="104" y2="134" stroke-width="2.2"></line>
      <circle cx="95" cy="134" r="2.6"></circle>
    </g>

    <!-- Pooled-effect summary diamond at the bottom of the plot (warm accent) -->
    <g transform="translate(90.5, 147)">
      <polygon points="-9,0 0,-4.6 9,0 0,4.6" fill="#F6AE2D" stroke="#1B4965" stroke-width="1" stroke-linejoin="round"></polygon>
    </g>

    <!-- Wordmark on the lower baseline -->
    <text x="90.5" y="176" text-anchor="middle" font-size="17" font-weight="700" letter-spacing="0" fill="#1B4965">
      <tspan>multisite</tspan><tspan font-weight="800">DGP</tspan>
    </text>
  </g><polygon points="90.5,1.5 179.5,52.25 179.5,156.75 90.5,207.5 1.5,156.75 1.5,52.25" fill="none" stroke="#1B4965" stroke-width="3" stroke-linejoin="round"></polygon></svg>