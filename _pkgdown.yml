home:
  title: "multisiteDGP — Data-generating processes for multisite trial simulations"
  description: |
    A pure-R toolkit for simulating layered multisite trial and
    meta-analysis summary-data generating processes. Build defensible
    site-effect distributions, calibrated standard-error margins,
    intentional precision dependence, and observation draws — all in
    a transparent four-layer pipeline with diagnostics, presets, and
    adapters for downstream meta-analysis packages.

    This research was supported by the Institute of Education Sciences,
    U.S. Department of Education, through Grant R305D240078 to the
    University of Alabama. The opinions expressed are those of the
    authors and do not represent views of the Institute or the U.S.
    Department of Education.
  links:
  - text: "Get started in 5 minutes"
    href: articles/a1-getting-started.html
  - text: "Choose a preset"
    href: articles/a2-choosing-a-preset.html
  - text: "Read diagnostics"
    href: articles/a3-diagnostics-in-practice.html
  - text: "Theory: the two-stage DGP"
    href: articles/m1-statistical-dgp.html

