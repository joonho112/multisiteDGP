  - m8-migration-from-siteBayes2

reference:
- title: Package
  contents:
  - multisiteDGP-package

- title: Front doors
  desc: >
    User-facing simulation entry points. Use `sim_multisite()` when
    you can specify site sizes; use `sim_meta()` when you can specify
    information-scale targets directly.
  contents:
  - sim_multisite
  - sim_meta
  - design_grid

- title: Design objects and data classes
  desc: >
    Immutable design records, validators, predicates, and data
    coercion. Construct a design once with `multisitedgp_design()`
    when you want to reuse it across multiple simulation calls or a
    `design_grid()` sweep.
  contents:
  - multisitedgp_design
  - validate_multisitedgp_design
  - update_multisitedgp_design
  - is_multisitedgp_design
  - is_multisitedgp_data
  - as_tibble.multisitedgp_data
  - print.multisitedgp_data
  - summary.multisitedgp_data

- title: Effect distributions
  desc: >
    Generate the latent site-level effects \eqn{\tau_j} at the heart
    of a multisite simulation. Eight built-in shapes — Gaussian,
    Student-t, skew normal, asymmetric Laplace, two-component
    mixture, point-mass slab, user callback, and a Dirichlet-process-
    mixture bridge — share a unit-variance convention so heterogeneity
    targets mean the same thing across shapes.
  contents:
  - gen_effects
  - gen_effects_gaussian
  - gen_effects_studentt
  - gen_effects_skewn
  - gen_effects_ald
  - gen_effects_mixture
  - gen_effects_pmslab
  - gen_effects_user
  - gen_effects_dpm

- title: Site sizes and standard errors
  desc: >
    Set how precisely each site is measured. Choose the
    site-size-driven model (sample sizes plus within-site variance)
    or the direct-precision model (information-scale targets).
  contents:
  - gen_site_sizes
  - gen_se_direct

- title: Precision dependence
  desc: >
    Inject intentional dependence between latent effects and
    site-level precision. Three injection methods — rank hill-climb,
    Gaussian copula, and a hybrid scheme — hit a target effect-precision
    correlation without distorting either margin.
  contents:
  - align_rank_corr
  - align_copula_corr
  - align_hybrid_corr

- title: Observations
  desc: >
    Observed site-level estimates from latent effects and precision —
    the final layer of the data-generating process.
  contents:
  - gen_observations

- title: Diagnostics
  desc: >
    Scenario feasibility, dependence verification, distributional fit,
    and shrinkage diagnostics — the four-question rubric for verifying
    a design behaves as intended before you commit to a long
    simulation run.
  contents:
  - compute_kappa
  - compute_I
  - compute_shrinkage
  - informativeness
  - mean_shrinkage
  - feasibility_index
  - default_thresholds
  - heterogeneity_ratio
  - realized_rank_corr
  - realized_rank_corr_marginal
  - bhattacharyya_coef
  - ks_distance
  - scenario_audit

- title: Presets
  desc: >
    Defensible starting designs for common multisite and meta-analysis
    questions. Each preset locks defensible parameter values and cites
    its source paper so a reviewer can defend the choice.
  contents:
  - presets

- title: Output adapters
  desc: >
    Coercions for downstream analysis packages — `'metafor'`,
    `'baggr'`, `'multisitepower'` — and tidy workflows.
  contents:
  - adapters

- title: Visualization
  desc: >
    Caterpillar / forest, funnel, and dependence-scatter plots
    for diagnosing a simulation.
  contents:
  - plots

- title: Reproducibility
  desc: >
    Stable hashes and provenance strings for simulation artifacts, so
    you can rerun and audit results months later.
  contents:
  - canonical_hash
  - provenance_string

