  - a7-case-study-meta-analysis
  - a8-cookbook
- title: Methodological Track
  desc: >
    Theory and specification — the formal data-generating process,
    the eight-shape G-distribution catalog with unit-variance
    standardization, site-size-driven and direct-precision margin / SE
    models, three precision-dependence injection methods, custom-G
    extensibility, downstream adapters, the reproducibility apparatus,
    and migration from siteBayes2.
  navbar: ~
