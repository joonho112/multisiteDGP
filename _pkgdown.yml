articles:
- title: Applied Track
  desc: >
    Workflow-oriented guides for designing a multisite simulation,
    choosing a preset, reading diagnostics, calibrating to real data,
    and writing case-study reports.
  navbar: ~
  contents:
  - a1-getting-started
  - a2-choosing-a-preset
  - a3-diagnostics-in-practice
  - a4-covariates-precision-dependence
  - a5-calibrating-real-data
